#import '@content/Concerts/Route.fragment.graphql'
#import '@content/Identifiable.fragment.graphql';
#import '@components/PageContent/ConcertModelContentField.fragment.graphql';
#import '@components/ConcertListItem/ConcertListItem.fragment.graphql';

query ConcertCollectionEntry($slug: String!) {
  record: concert(filter: { slug: { eq: $slug } }) {
    ...Identifiable
    ...ConcertRoute
    ...ConcertListItem
    _seoMetaTags {
      attributes
      content
      tag
    }
    content {
      ...ConcertRecordContent
    }
  }
}
