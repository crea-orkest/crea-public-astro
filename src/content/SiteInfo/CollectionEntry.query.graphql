#import './SeoField.fragment.graphql';
#import '@components/Navigation/Navigation.fragment.graphql';

query SiteInfoCollectionEntry {
  general {
    __typename
    id
    title
    ...Navigation
  }
  seo: _site {
    __typename
    faviconMetaTags(variants: [icon, appleTouchIcon, msApplication]) {
      tag
      attributes
    }
    globalSeo {
      facebookPageUrl
      siteName
      titleSuffix
      twitterAccount
      fallbackSeo {
        ...SeoField
      }
    }
  }
}
