#import '@content/Pages/Route.fragment.graphql'
#import '@content/Identifiable.fragment.graphql';
#import '@components/PageContent/PageModelContentField.fragment.graphql';

query PageCollectionEntry($slug: String!) {
  record: page(filter: { slug: { eq: $slug } }) {
    ...Identifiable
    ...PageRoute
    content {
      ...PageRecordContent
    }
  }
}
